<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">

<h:head>
    <title>HealthHub Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
</h:head>

<h:body styleClass="min-h-screen bg-slate-950 text-slate-100">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <div class="mb-8 text-center">
                <h1 class="text-4xl font-bold tracking-tight text-white">HealthHub</h1>
                <p class="mt-3 text-sm text-slate-400">Secure admin access via Keycloak</p>
            </div>

            <div class="rounded-2xl border border-slate-800 bg-slate-900/80 shadow-2xl backdrop-blur p-8">
                <h2 class="text-2xl font-semibold text-white mb-6">Admin Login</h2>

                <div class="space-y-5">
                    <div class="rounded-lg border border-cyan-500/20 bg-cyan-500/10 px-4 py-3 text-sm text-cyan-200">
                        Sign in with your Keycloak administrator account.
                    </div>

                    <h:form>
                        <h:commandButton value="Sign in with Keycloak"
                                         action="#{loginBean.login}"
                                         styleClass="w-full rounded-xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-slate-950 shadow-lg shadow-cyan-500/20 transition hover:bg-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-300"/>
                    </h:form>
                </div>
            </div>

            <p class="mt-6 text-center text-xs text-slate-500">
                HealthHub Admin
            </p>
        </div>
    </div>
</h:body>
</html>
