<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>HealthHub Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
</h:head>

<h:body styleClass="min-h-screen bg-slate-950 text-slate-100">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <div class="mb-8 text-center">
                <h1 class="text-4xl font-bold tracking-tight text-white">HealthHub</h1>
                <p class="mt-3 text-sm text-slate-400">Secure access to the portal</p>
            </div>

            <div class="rounded-2xl border border-slate-800 bg-slate-900/80 shadow-2xl backdrop-blur p-8">
                <h2 class="text-2xl font-semibold text-white mb-6">Login</h2>

                <h:form styleClass="space-y-5">
                    <h:messages globalOnly="true"
                                layout="list"
                                styleClass="rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-300"/>

                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-300 mb-2">
                            Username
                        </label>
                        <h:inputText id="username"
                                     value="#{loginBean.username}"
                                     required="true"
                                     styleClass="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30"/>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">
                            Password
                        </label>
                        <h:inputSecret id="password"
                                       value="#{loginBean.password}"
                                       required="true"
                                       redisplay="false"
                                       styleClass="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30"/>
                    </div>

                    <div>
                        <label for="captcha" class="block text-sm font-medium text-slate-300 mb-2">
                            #{loginCaptchaBean.question}
                        </label>
                        <h:inputText id="captcha"
                                     value="#{loginBean.captchaAnswer}"
                                     required="true"
                                     styleClass="w-full rounded-xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/30"/>
                    </div>

                    <div class="pt-2">
                        <h:commandButton value="Sign in"
                                         action="#{loginBean.login}"
                                         styleClass="w-full rounded-xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-slate-950 shadow-lg shadow-cyan-500/20 transition hover:bg-cyan-400 focus:outline-none focus:ring-2 focus:ring-cyan-300"/>
                    </div>
                </h:form>
            </div>

            <p class="mt-6 text-center text-xs text-slate-500">
                HealthHub · Jakarta EE · JSF
            </p>
        </div>
    </div>
</h:body>
</html>
