<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html">
<h:head>
    <title>HealthHub Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
</h:head>
<h:body styleClass="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-4xl px-6 py-10">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold">HealthHub</h1>
                <p class="mt-2 text-slate-400">Angemeldet als #{userSession.username}</p>
            </div>
            <h:form>
                <h:commandButton value="Logout"
                                 action="#{logoutBean.logout}"
                                 styleClass="rounded-xl bg-slate-800 px-4 py-2 text-sm font-semibold hover:bg-slate-700"/>
            </h:form>
        </div>

        <div class="mt-8 grid gap-4 md:grid-cols-2">
            <div class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
                <h2 class="text-xl font-semibold">Portal</h2>
                <p class="mt-2 text-slate-400">Basisansicht nach erfolgreichem Login.</p>
                <p class="mt-4 text-sm text-slate-300">User-ID: #{userSession.currentUserId}</p>
                <p class="mt-1 text-sm text-slate-300">Patient-Kontext: #{userSession.currentPatientId}</p>
            </div>

            <div class="rounded-2xl border border-slate-800 bg-slate-900 p-6">
                <h2 class="text-xl font-semibold">Navigation</h2>
                <ul class="mt-3 space-y-2 text-cyan-300">
                    <li><h:link value="Capture" outcome="/app/capture"/></li>
                    <li rendered="#{userSession.admin}"><h:link value="Admin Dashboard" outcome="/admin/dashboard"/></li>
                </ul>
            </div>
        </div>
    </div>
</h:body>
</html>
