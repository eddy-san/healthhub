version: "3.8"

services:
  healthhub-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthhub-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - traefik_default

  healthhub-app:
    build: .
    container_name: healthhub-app
    restart: unless-stopped
    depends_on:
      - healthhub-sql
    networks:
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.healthhub.rule=Host(`healthhub.roth-it-solutions.de`)"
      - "traefik.http.routers.healthhub.entrypoints=websecure"
      - "traefik.http.routers.healthhub.tls.certresolver=letsencrypt"
      - "traefik.http.services.healthhub.loadbalancer.server.port=8080"

volumes:
  mssql_data:

networks:
  traefik_default:
    external: true