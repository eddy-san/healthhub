services:
  healthhub-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthhub-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - healthhub_internal

  healthhub-app:
    build:
      context: ..
      dockerfile: docker/wildfly/Dockerfile
    container_name: healthhub-app
    restart: unless-stopped
    depends_on:
      - healthhub-sql
    environment:
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      DB_HOST: healthhub-sql
      DB_PORT: 1433
      DB_NAME: healthhub_db
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - healthhub_internal
      - traefik_default

volumes:
  mssql_data:

networks:
  healthhub_internal:
  traefik_default:
    external: true