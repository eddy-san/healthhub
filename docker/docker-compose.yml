services:
  healthhub-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthhub-sql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - healthhub_internal
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD}", "-Q", "SELECT 1", "-C" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  healthhub-app:
    build:
      context: ..
      dockerfile: docker/wildfly/Dockerfile
    container_name: healthhub-app
    restart: unless-stopped
    depends_on:
      - healthhub-sql
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
      DB_HOST: healthhub-sql
      DB_PORT: 1433
      DB_NAME: healthhub_db
      HEALTHHUB_WEB_CLIENT_SECRET: ${HEALTHHUB_WEB_CLIENT_SECRET}
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - healthhub_internal
      - traefik_default

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: healthhub-cloudbeaver
    restart: unless-stopped
    depends_on:
      - healthhub-sql
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - healthhub_internal
      - traefik_default

volumes:
  mssql_data:
  cloudbeaver_data:

networks:
  healthhub_internal:
  traefik_default:
    external: true