services:
  healthhub-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: healthhub-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20

  healthhub-app:
    build:
      context: ..
      dockerfile: docker/wildfly/Dockerfile
    container_name: healthhub-app
    environment:
      DB_USER: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "8080:8080"
      - "9990:9990"
    depends_on:
      healthhub-sql:
        condition: service_healthy

volumes:
  mssql_data: