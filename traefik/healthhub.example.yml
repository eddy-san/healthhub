# Example Traefik configuration for HealthHub
#
# This file demonstrates how the HealthHub application is exposed
# behind Traefik with security middleware.
#
# Production configuration may differ and should not expose secrets.

http:

  ############################################################
  # Routers
  ############################################################

  routers:

    # ---------------------------------------------------------
    # Admin login route
    # Protected with rate limiting, inflight request control
    # and fail2ban middleware.
    # ---------------------------------------------------------
    healthhub-admin-login:
      rule: "Host(`healthhub.example.com`) && Path(`/admin/login.xhtml`)"
      priority: 110
      entryPoints:
        - websecure
      service: healthhub
      middlewares:
        - healthhub-web-login-security
      tls:
        certResolver: letsencrypt


    # ---------------------------------------------------------
    # API login route
    # Used by wearable devices or external applications
    # to obtain JWT tokens.
    # ---------------------------------------------------------
    healthhub-api-login:
      rule: "Host(`healthhub.example.com`) && PathPrefix(`/api/auth/login`)"
      priority: 100
      entryPoints:
        - websecure
      service: healthhub
      middlewares:
        - healthhub-api-login-security
      tls:
        certResolver: letsencrypt


    # ---------------------------------------------------------
    # HealthHub API v1
    # JWT protected API endpoints
    # ---------------------------------------------------------
    healthhub-api-v1:
      rule: "Host(`healthhub.example.com`) && PathPrefix(`/api/v1/`)"
      priority: 80
      entryPoints:
        - websecure
      service: healthhub
      middlewares:
        - healthhub-api-v1-security
      tls:
        certResolver: letsencrypt


    # ---------------------------------------------------------
    # Main application
    # ---------------------------------------------------------
    healthhub:
      rule: "Host(`healthhub.example.com`)"
      entryPoints:
        - websecure
      service: healthhub
      middlewares:
        - healthhub-app-security
      tls:
        certResolver: letsencrypt


  ############################################################
  # Services
  ############################################################

  services:

    healthhub:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://healthhub-app:8080"


  ############################################################
  # Middleware
  ############################################################

  middlewares:

    # ---------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------
    healthhub-security-headers:
      headers:
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow, noarchive, nosnippet"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"


    # ---------------------------------------------------------
    # API login protection
    # ---------------------------------------------------------
    healthhub-api-login-ratelimit:
      rateLimit:
        average: 5
        period: 1m
        burst: 5

    healthhub-api-login-inflight:
      inFlightReq:
        amount: 2

    healthhub-api-login-security:
      chain:
        middlewares:
          - healthhub-api-login-ratelimit
          - healthhub-api-login-inflight
          - fail2ban
          - healthhub-security-headers


    # ---------------------------------------------------------
    # API v1 protection
    # ---------------------------------------------------------
    healthhub-api-v1-ratelimit:
      rateLimit:
        average: 60
        period: 1m
        burst: 30

    healthhub-api-v1-security:
      chain:
        middlewares:
          - healthhub-api-v1-ratelimit
          - healthhub-security-headers


    # ---------------------------------------------------------
    # Admin login protection
    # ---------------------------------------------------------
    healthhub-web-login-ratelimit:
      rateLimit:
        average: 5
        period: 1m
        burst: 5

    healthhub-web-login-inflight:
      inFlightReq:
        amount: 2

    healthhub-web-login-security:
      chain:
        middlewares:
          - healthhub-web-login-ratelimit
          - healthhub-web-login-inflight
          - fail2ban
          - healthhub-security-headers


    # ---------------------------------------------------------
    # Application security
    # ---------------------------------------------------------
    healthhub-app-security:
      chain:
        middlewares:
          - healthhub-security-headers


    # ---------------------------------------------------------
    # Fail2Ban plugin configuration
    # ---------------------------------------------------------
    fail2ban:
      plugin:
        fail2ban:
          enabled: true
          rules:
            bantime: 2m
            findtime: 5m
            maxretry: 10